version: "3.8"

services:
  node-red:
    image: nodered/node-red:latest
    container_name: beacon-node-red
    environment:
      - TZ=America/New_York
    ports:
      - "1880:1880"
    volumes:
      - ./node-red:/data
    command: /bin/bash -c "cd /data && npm install && npm start"

  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: eece5155
      DOCKER_INFLUXDB_INIT_BUCKET: iot-sensors
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: seminar-test-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_SECURITY_ALLOW_EMBEDDING: true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data: